webdriver {
  driver = chrome
  autodownload = true
  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = ["--start-maximized", "--disable-notifications", "--no-sandbox", "--disable-dev-shm-usage"]
    }
  }
}

serenity {
  project.name = "DemoBlaze E2E Tests"
  take.screenshots = AFTER_EACH_STEP
  reports.show.step.details = true
}

headless.mode = false
